module: topology-analysis
counterexamples:
  - id: issue-9-self-loop-and-multi-edge
    source: issue-9 topology analysis surface
    fixture: tests/fixtures/structure-analysis-edge-cases.fixture.json
    regression_test: tests/analysis-topology.test.ts::deduplicates multi-edges and ignores self-loops
    expectation:
      edge_count: 1
      warnings:
        - self_loop_ignored
  - id: issue-9-empty-goal-scope
    source: issue-9 topology analysis surface
    fixture: tests/fixtures/structure-analysis-edge-cases.fixture.json
    regression_test: tests/analysis-topology.test.ts::warns when the scoped graph has no unresolved nodes
    expectation:
      node_count: 0
      beta_0: 0
      beta_1: 0
      warnings:
        - scope_has_no_unresolved_nodes
